name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate skill frontmatter and scripts
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          critical_files = {
              "skills/archproof-audit/SKILL.md": 20,
              "skills/archproof-audit/scripts/collect_architecture_evidence.py": 50,
              "skills/archproof-audit/scripts/test_collect_architecture_evidence.py": 20,
              ".github/workflows/validate.yml": 20,
          }
          for file_name, minimum_lines in critical_files.items():
              line_count = len(Path(file_name).read_text(encoding="utf-8").splitlines())
              if line_count < minimum_lines:
                  raise SystemExit(f"{file_name} appears truncated or line-break damaged: {line_count} lines")

          skill = Path("skills/archproof-audit/SKILL.md")
          text = skill.read_text(encoding="utf-8")
          if not text.startswith("---\n"):
              raise SystemExit("SKILL.md must start with YAML frontmatter")
          fm = text.split("---", 2)[1]
          if "name: archproof-audit" not in fm:
              raise SystemExit("missing skill name")
          if "description:" not in fm:
              raise SystemExit("missing skill description")
          secret_patterns = [
              r"gh[oprs]_[A-Za-z0-9_]{20,}",
              r"sk-[A-Za-z0-9_-]{12,}",
              r"(api[_-]?key|password|secret|token)\s*[:=]",
          ]
          for pattern in secret_patterns:
              if re.search(pattern, text, re.I):
                  raise SystemExit(f"possible secret marker in SKILL.md: {pattern}")
          PY
          python -m py_compile skills/archproof-audit/scripts/collect_architecture_evidence.py
          python -m py_compile skills/archproof-audit/scripts/test_collect_architecture_evidence.py
          python skills/archproof-audit/scripts/test_collect_architecture_evidence.py
